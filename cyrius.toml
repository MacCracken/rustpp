[package]
name = "cyrius"
version = "3.4.19"
description = "Sovereign, self-hosting systems language"
license = "GPL-3.0-only"
repository = "https://github.com/MacCracken/cyrius"

[build]
src = "src/main.cyr"
output = "build/cc3"

[deps.sakshi]
git = "https://github.com/MacCracken/sakshi.git"
tag = "0.9.0"
modules = ["sakshi.cyr", "sakshi_full.cyr"]

[deps.patra]
git = "https://github.com/MacCracken/patra.git"
tag = "0.14.0"
modules = ["dist/patra.cyr"]

[deps.sigil]
git = "https://github.com/MacCracken/sigil.git"
tag = "2.0.1"
modules = ["dist/sigil.cyr"]

[deps.yukti]
git = "https://github.com/MacCracken/yukti.git"
tag = "1.2.0"
modules = ["dist/yukti.cyr"]

# mabda — GPU foundation layer. Activated in v3.4.18 (staged in v3.4.17).
# Provides the Cyrius public GPU API via a transitional wgpu-native C shim;
# public API is the stability contract, the backend swap to pure Cyrius is
# future work and invisible to consumers. v3.4.18's input_buf expansion
# (128KB → 256KB) was the blocking cc3 change — the 141KB dist/mabda.cyr
# bundle did not fit the old buffer and triggered silent stdin truncation.
# v3.4.19 bumped the tag to 2.1.2 — pure repo hygiene (rust-old reference
# tree removed), bundle bytes unchanged.
[deps.mabda]
git = "https://github.com/MacCracken/mabda.git"
tag = "2.1.2"
modules = ["dist/mabda.cyr"]
