[package]
name = "cyrius"
version = "3.4.19"
description = "Sovereign, self-hosting systems language"
license = "GPL-3.0-only"
repository = "https://github.com/MacCracken/cyrius"

[build]
src = "src/main.cyr"
output = "build/cc3"

[deps.sakshi]
git = "https://github.com/MacCracken/sakshi.git"
tag = "0.9.0"
modules = ["sakshi.cyr", "sakshi_full.cyr"]

[deps.patra]
git = "https://github.com/MacCracken/patra.git"
tag = "0.15.0"
modules = ["dist/patra.cyr"]

[deps.sigil]
git = "https://github.com/MacCracken/sigil.git"
tag = "2.1.2"
modules = ["dist/sigil.cyr"]

[deps.yukti]
git = "https://github.com/MacCracken/yukti.git"
tag = "1.2.0"
modules = ["dist/yukti.cyr"]

# mabda — GPU foundation layer. Activated in v3.4.19. Provides the Cyrius
# public GPU API via a transitional wgpu-native C shim; public API is the
# stability contract, the backend swap to pure Cyrius is future work and
# invisible to consumers. v3.4.19 also expanded input_buf 128KB → 256KB
# (the blocking cc3 change — the 141KB dist/mabda.cyr bundle did not fit
# the old buffer and triggered silent stdin truncation). The dep tag
# landed at mabda 2.1.2 — a repo-hygiene release atop 2.1.1 that removed
# the rust-old reference tree without touching bundle bytes.
[deps.mabda]
git = "https://github.com/MacCracken/mabda.git"
tag = "2.1.2"
modules = ["dist/mabda.cyr"]

[deps.sankoch]
git = "https://github.com/MacCracken/sankoch.git"
tag = "1.0.0"
modules = ["dist/sankoch.cyr"]
