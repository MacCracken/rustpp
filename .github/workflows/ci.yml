name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  AGNOS_IMAGE: ghcr.io/maccracken/agnosticos:2026.3.31

jobs:
  # ── Build ──
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup compiler
        run: chmod +x build/cc5
      - name: Build x86_64 compiler from source
        run: |
          cat src/main.cyr | ./build/cc5 > /tmp/cc5 && chmod +x /tmp/cc5
          SZ=$(wc -c < /tmp/cc5)
          echo "cc5 (x86_64): $SZ bytes"
          test $SZ -gt 80000
      - name: Self-hosting verify
        run: |
          cat src/main.cyr | /tmp/cc5 > /tmp/cc5b
          cmp /tmp/cc5 /tmp/cc5b
          echo "PASS: cc5==cc5 byte-identical"
      - name: Build aarch64 cross-compiler
        run: |
          echo "build/cc5: $(wc -c < ./build/cc5) bytes"
          echo "build/cc5 md5: $(md5sum build/cc5 | cut -d' ' -f1)"
          echo "lex.cyr md5: $(md5sum src/frontend/lex.cyr | cut -d' ' -f1)"
          echo "main_aarch64 md5: $(md5sum src/main_aarch64.cyr | cut -d' ' -f1)"
          ./build/cc5 --version || echo "cc5 --version failed"
          cat src/main_aarch64.cyr | ./build/cc5 > ./build/cc5_aarch64 && chmod +x ./build/cc5_aarch64
          echo "cc5_aarch64: $(wc -c < ./build/cc5_aarch64) bytes"
          file ./build/cc5_aarch64
      - name: Build tools
        run: |
          cat cbt/cyrius.cyr | ./build/cc5 > ./build/cyrius 2>/dev/null && chmod +x ./build/cyrius
          cat programs/cyrfmt.cyr | ./build/cc5 > ./build/cyrfmt && chmod +x ./build/cyrfmt
          cat programs/cyrlint.cyr | ./build/cc5 > ./build/cyrlint && chmod +x ./build/cyrlint
          cat programs/cyrdoc.cyr | ./build/cc5 > ./build/cyrdoc && chmod +x ./build/cyrdoc
          cat programs/cyrc.cyr | ./build/cc5 > ./build/cyrc && chmod +x ./build/cyrc
          cat programs/ark.cyr | ./build/cc5 > ./build/ark && chmod +x ./build/ark

  # ── Check & Format ──
  check:
    name: Check & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup
        run: |
          chmod +x build/cc5
          cat cbt/cyrius.cyr | ./build/cc5 > ./build/cyrius 2>/dev/null && chmod +x ./build/cyrius
          cat programs/cyrfmt.cyr | ./build/cc5 > ./build/cyrfmt && chmod +x ./build/cyrfmt
          cat programs/cyrlint.cyr | ./build/cc5 > ./build/cyrlint && chmod +x ./build/cyrlint
      - name: Resolve dependencies
        run: |
          chmod +x scripts/cyrius
          ./scripts/cyrius deps
      - name: Format check (stdlib)
        run: |
          fail=0
          for f in lib/*.cyr; do
            [ -L "$f" ] && continue
            ./build/cyrfmt "$f" > /tmp/fmt_check
            if ! diff -q "$f" /tmp/fmt_check > /dev/null 2>&1; then
              echo "needs formatting: $(basename $f)"
              fail=1
            fi
          done
          rm -f /tmp/fmt_check
          test $fail -eq 0
      - name: Lint (stdlib)
        run: |
          total=0
          for f in lib/*.cyr; do
            [ -L "$f" ] && continue
            w=$(./build/cyrlint "$f" 2>&1 | tail -1 | grep -oP '^\d+' || echo 0)
            total=$((total + w))
          done
          echo "$total warnings"
          test $total -eq 0

  # ── Supply Chain ──
  supply-chain:
    name: Supply Chain
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup
        run: |
          chmod +x build/cc5
          cat programs/cyrc.cyr | ./build/cc5 > ./build/cyrc && chmod +x ./build/cyrc
      - name: Vet
        run: |
          for f in programs/ark.cyr cbt/cyrius.cyr programs/cyrc.cyr; do
            if [ -f "$f" ]; then ./build/cyrc vet "$f"; fi
          done
      - name: Deny
        run: |
          for f in programs/ark.cyr cbt/cyrius.cyr programs/cyrc.cyr; do
            if [ -f "$f" ]; then ./build/cyrc deny "$f"; fi
          done

  # ── Security ──
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Scan for dangerous patterns
        run: |
          if grep -r 'syscall(59' lib/ 2>/dev/null | grep -v process.cyr | grep -v agnosys; then
            echo "WARN: raw execve outside process.cyr/agnosys"
          fi
          echo "security scan complete"

  # ── Benchmarks ──
  benchmarks:
    name: Benchmarks
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup compiler
        run: chmod +x build/cc5
      - name: Benchmark suite (tier 1+2)
        run: sh scripts/bench-history.sh --tier2
      - name: Upload benchmark artifacts
        uses: actions/upload-artifact@v4
        with:
          name: benchmarks
          path: |
            bench-history.csv
            BENCHMARKS.md
          retention-days: 90

  # ── Tests (ubuntu) ──
  test:
    name: Test (ubuntu)
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup compiler
        run: |
          chmod +x build/cc5
          cat cbt/cyrius.cyr | ./build/cc5 > ./build/cyrius 2>/dev/null && chmod +x ./build/cyrius
      - name: Resolve dependencies
        run: |
          chmod +x scripts/cyrius
          ./scripts/cyrius deps
      - name: Heap map audit
        run: sh tests/heapmap.sh
      - name: Test suite (.tcyr)
        run: |
          pass=0; fail=0
          for t in tests/tcyr/*.tcyr; do
            name=$(basename "$t" .tcyr)
            tmpbin="/tmp/ci_t_$$"
            cat "$t" | ./build/cc5 > "$tmpbin" 2>/dev/null && chmod +x "$tmpbin"
            if [ $? -ne 0 ]; then echo "FAIL (compile): $name"; fail=$((fail+1)); continue; fi
            output=$("$tmpbin" 2>&1) && ec=0 || ec=$?
            rm -f "$tmpbin"
            f=$(echo "$output" | grep -o '[0-9]* failed' | tail -1 | grep -o '^[0-9]*')
            if [ "$ec" -ne 0 ] || { [ -n "$f" ] && [ "$f" -gt 0 ]; }; then
              echo "FAIL: $name"; fail=$((fail+1))
            else
              echo "PASS: $name"; pass=$((pass+1))
            fi
          done
          echo "$pass passed, $fail failed"
          test $fail -eq 0

  # ── Tests (AGNOS) ──
  test-agnos:
    name: Test (AGNOS)
    needs: [build]
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/maccracken/agnosticos:2026.3.31
      options: --user root
    steps:
      - uses: actions/checkout@v4
      - name: Setup compiler
        run: |
          chmod +x build/cc5
          cat cbt/cyrius.cyr | ./build/cc5 > ./build/cyrius 2>/dev/null && chmod +x ./build/cyrius || true
          if command -v git >/dev/null 2>&1; then
            chmod +x scripts/cyrius
            ./scripts/cyrius deps
          else
            echo "git not available, skipping dep resolution"
          fi
      - name: Test suite (.tcyr)
        run: |
          pass=0; fail=0
          for t in tests/tcyr/*.tcyr; do
            # Skip tests requiring deps if deps not resolved
            name=$(basename "$t" .tcyr)
            case "$name" in sakshi|sakshi_full) [ ! -f lib/sakshi.cyr ] && echo "SKIP: $name (no deps)" && continue ;; esac
            name=$(basename "$t" .tcyr)
            tmpbin="/tmp/ci_t_$$"
            cat "$t" | ./build/cc5 > "$tmpbin" 2>/dev/null && chmod +x "$tmpbin"
            if [ $? -ne 0 ]; then echo "FAIL (compile): $name"; fail=$((fail+1)); continue; fi
            output=$("$tmpbin" 2>&1) && ec=0 || ec=$?
            rm -f "$tmpbin"
            f=$(echo "$output" | grep -o '[0-9]* failed' | tail -1 | grep -o '^[0-9]*')
            if [ "$ec" -ne 0 ] || { [ -n "$f" ] && [ "$f" -gt 0 ]; }; then
              echo "FAIL: $name"; fail=$((fail+1))
            else
              echo "PASS: $name"; pass=$((pass+1))
            fi
          done
          echo "$pass passed, $fail failed"
          test $fail -eq 0

  # ── aarch64 ──
  aarch64:
    name: aarch64 Cross
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install qemu-user
        run: sudo apt-get update && sudo apt-get install -y qemu-user-static
      - name: Setup compilers
        run: |
          chmod +x build/cc5
          echo "build/cc5: $(wc -c < ./build/cc5) bytes"
          echo "build/cc5 md5: $(md5sum build/cc5 | cut -d' ' -f1)"
          echo "lex.cyr md5: $(md5sum src/frontend/lex.cyr | cut -d' ' -f1)"
          ./build/cc5 --version || echo "cc5 --version failed with exit $?"
          cat src/main_aarch64.cyr | ./build/cc5 > ./build/cc5_aarch64 && chmod +x ./build/cc5_aarch64
          echo "cc5_aarch64: $(wc -c < ./build/cc5_aarch64) bytes"
      - name: aarch64 tests
        run: |
          pass=0; fail=0
          for test in \
            "literal:var x = 42;:42" \
            "add:var x = 20 + 22;:42" \
            "sub:var x = 50 - 8;:42" \
            "mul:var x = 6 * 7;:42" \
            "div:var x = 84 / 2;:42" \
            "mod:var r = 10 % 3;:1" \
            "precedence:var x = 2 + 5 * 8;:42" \
            "if:var x = 0; if (1 == 1) { x = 42; }:42" \
            "if_else:var x = 0; if (0 == 1) { x = 0; } else { x = 42; }:42" \
            "while:var x = 0; while (x < 10) { x = x + 1; }:10" \
            "for:var s = 0; for (var i = 1; i <= 10; i = i + 1) { s = s + i; } var r = s;:55" \
            "break:var i = 0; while (i < 100) { if (i == 42) { break; } i = i + 1; }:42" \
            "fn:fn f(a, b) { return a + b; } var x = f(20, 22);:42" \
            "fn_recurse:fn fib(n) { if (n <= 1) { return n; } return fib(n-1) + fib(n-2); } var r = fib(7);:13" \
            "fn_6args:fn f(a,b,c,d,e,g) { return a+b+c+d+e+g; } var r = f(1,2,3,4,5,27);:42" \
            "enum:enum E { A = 10; B = 42; } fn f() { return B; } var r = f();:42" \
            "struct:struct P { x; y; } var p = P { 20, 22 }; var r = p.x + p.y;:42" \
            "syscall:syscall(1, 1, \"ok\", 2); var r = 42;:42" \
            "and:var r = 0xFF & 0x2A;:42" \
            "or:var r = 0x20 | 0x0A;:42" \
            "xor:var r = 0xFF ^ 0xD5;:42" \
            "shl:var r = 21 << 1;:42" \
            "shr:var r = 84 >> 1;:42" \
            "store_load:var buf[2]; store64(&buf, 42); var r = load64(&buf);:42" \
            "store8:var buf[2]; store8(&buf, 42); var r = load8(&buf);:42" \
            "complex:fn max(a,b) { if (a > b) { return a; } return b; } fn min(a,b) { if (a < b) { return a; } return b; } var r = max(min(50, 42), 10);:42"
          do
            name=$(echo "$test" | cut -d: -f1)
            code=$(echo "$test" | cut -d: -f2)
            expected=$(echo "$test" | cut -d: -f3)
            echo "$code" | ./build/cc5_aarch64 > /tmp/a64_t && chmod +x /tmp/a64_t
            result=$(timeout 5 qemu-aarch64-static /tmp/a64_t >/dev/null 2>&1; echo $?)
            if [ "$result" = "$expected" ]; then pass=$((pass+1)); else echo "FAIL: $name"; fail=$((fail+1)); fi
          done
          echo "$pass passed, $fail failed"
          test $fail -eq 0

  # ── macOS Mach-O ──
  macho:
    name: Mach-O Cross
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup compiler
        run: |
          chmod +x build/cc5
      - name: Mach-O compilation tests
        run: |
          pass=0; fail=0
          for test in \
            "exit42:include \"lib/syscalls_macos.cyr\"\nsyscall(SYS_EXIT, 42);" \
            "write:include \"lib/syscalls_macos.cyr\"\nsyscall(SYS_WRITE, 1, \"ok\", 2);\nsyscall(SYS_EXIT, 0);" \
            "vars:include \"lib/syscalls_macos.cyr\"\nvar x = 20 + 22;\nsyscall(SYS_EXIT, x);" \
            "fn:include \"lib/syscalls_macos.cyr\"\nfn f(a, b) { return a + b; }\nsyscall(SYS_EXIT, f(20, 22));"
          do
            name=$(echo "$test" | cut -d: -f1)
            code=$(echo "$test" | cut -d: -f2-)
            printf "$code" | CYRIUS_MACHO=1 ./build/cc5 2>/dev/null > /tmp/macho_test
            # Verify: non-empty, Mach-O magic (FEEDFACF little-endian = CF FA ED FE)
            sz=$(wc -c < /tmp/macho_test)
            magic=$(xxd -l4 -p /tmp/macho_test)
            if [ "$sz" -gt 0 ] && [ "$magic" = "cffa edfe" -o "$magic" = "cffaedfe" ]; then
              pass=$((pass+1))
            else
              echo "FAIL: $name (size=$sz magic=$magic)"
              fail=$((fail+1))
            fi
          done
          echo "$pass passed, $fail failed"
          test $fail -eq 0
      - name: Mach-O file identification
        run: |
          echo 'include "lib/syscalls_macos.cyr"
          syscall(SYS_WRITE, 1, "hello\n", 6);
          syscall(SYS_EXIT, 0);' | CYRIUS_MACHO=1 ./build/cc5 2>/dev/null > /tmp/macho_id
          file /tmp/macho_id | grep -q "Mach-O 64-bit x86_64"

  # ── Documentation ──
  doc:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build cyrdoc
        run: |
          chmod +x build/cc5
          cat programs/cyrdoc.cyr | ./build/cc5 > ./build/cyrdoc && chmod +x ./build/cyrdoc
      - name: Doc coverage (stdlib)
        run: |
          total=0
          for f in lib/*.cyr; do
            [ -L "$f" ] && continue
            u=$(./build/cyrdoc --check "$f" 2>&1 | tail -1 | grep -oP '(\d+) undocumented' | grep -oP '^\d+' || echo 0)
            total=$((total + u))
          done
          echo "$total undocumented"
          test $total -eq 0
      - name: Required docs exist
        run: |
          for doc in README.md CHANGELOG.md VERSION CONTRIBUTING.md SECURITY.md LICENSE \
                     docs/tutorial.md docs/cyrius-guide.md docs/stdlib-reference.md docs/faq.md docs/benchmarks.md; do
            test -f "$doc" || { echo "missing: $doc"; exit 1; }
          done
          echo "all documentation present"
