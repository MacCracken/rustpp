name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  AGNOS_IMAGE: ghcr.io/maccracken/agnosticos:2026.3.31

jobs:
  # ── Build ──
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup compiler
        run: chmod +x build/cc5
      - name: Build x86_64 compiler from source
        run: |
          cat src/main.cyr | ./build/cc5 > /tmp/cc5 && chmod +x /tmp/cc5
          SZ=$(wc -c < /tmp/cc5)
          echo "cc5 (x86_64): $SZ bytes"
          test $SZ -gt 80000
      - name: Self-hosting verify
        run: |
          cat src/main.cyr | /tmp/cc5 > /tmp/cc5b
          cmp /tmp/cc5 /tmp/cc5b
          echo "PASS: cc5==cc5 byte-identical"
      - name: Build aarch64 cross-compiler
        run: |
          echo "build/cc5: $(wc -c < ./build/cc5) bytes"
          echo "build/cc5 md5: $(md5sum build/cc5 | cut -d' ' -f1)"
          echo "lex.cyr md5: $(md5sum src/frontend/lex.cyr | cut -d' ' -f1)"
          echo "main_aarch64 md5: $(md5sum src/main_aarch64.cyr | cut -d' ' -f1)"
          ./build/cc5 --version || echo "cc5 --version failed"
          cat src/main_aarch64.cyr | ./build/cc5 > ./build/cc5_aarch64 && chmod +x ./build/cc5_aarch64
          echo "cc5_aarch64: $(wc -c < ./build/cc5_aarch64) bytes"
          file ./build/cc5_aarch64
      - name: Build tools
        run: |
          cat cbt/cyrius.cyr | ./build/cc5 > ./build/cyrius 2>/dev/null && chmod +x ./build/cyrius
          cat programs/cyrfmt.cyr | ./build/cc5 > ./build/cyrfmt && chmod +x ./build/cyrfmt
          cat programs/cyrlint.cyr | ./build/cc5 > ./build/cyrlint && chmod +x ./build/cyrlint
          cat programs/cyrdoc.cyr | ./build/cc5 > ./build/cyrdoc && chmod +x ./build/cyrdoc
          cat programs/cyrc.cyr | ./build/cc5 > ./build/cyrc && chmod +x ./build/cyrc
          cat programs/ark.cyr | ./build/cc5 > ./build/ark && chmod +x ./build/ark

  # ── Check & Format ──
  check:
    name: Check & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup
        run: |
          chmod +x build/cc5
          cat cbt/cyrius.cyr | ./build/cc5 > ./build/cyrius 2>/dev/null && chmod +x ./build/cyrius
          cat programs/cyrfmt.cyr | ./build/cc5 > ./build/cyrfmt && chmod +x ./build/cyrfmt
          cat programs/cyrlint.cyr | ./build/cc5 > ./build/cyrlint && chmod +x ./build/cyrlint
      - name: Resolve dependencies
        run: |
          chmod +x scripts/cyrius
          ./scripts/cyrius deps
      - name: Format check (stdlib)
        run: |
          fail=0
          for f in lib/*.cyr; do
            [ -L "$f" ] && continue
            ./build/cyrfmt "$f" > /tmp/fmt_check
            if ! diff -q "$f" /tmp/fmt_check > /dev/null 2>&1; then
              echo "needs formatting: $(basename $f)"
              fail=1
            fi
          done
          rm -f /tmp/fmt_check
          test $fail -eq 0
      - name: Lint (stdlib)
        run: |
          total=0
          for f in lib/*.cyr; do
            [ -L "$f" ] && continue
            w=$(./build/cyrlint "$f" 2>&1 | tail -1 | grep -oP '^\d+' || echo 0)
            total=$((total + w))
          done
          echo "$total warnings"
          test $total -eq 0

  # ── Supply Chain ──
  supply-chain:
    name: Supply Chain
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup
        run: |
          chmod +x build/cc5
          cat programs/cyrc.cyr | ./build/cc5 > ./build/cyrc && chmod +x ./build/cyrc
      - name: Vet
        run: |
          for f in programs/ark.cyr cbt/cyrius.cyr programs/cyrc.cyr; do
            if [ -f "$f" ]; then ./build/cyrc vet "$f"; fi
          done
      - name: Deny
        run: |
          for f in programs/ark.cyr cbt/cyrius.cyr programs/cyrc.cyr; do
            if [ -f "$f" ]; then ./build/cyrc deny "$f"; fi
          done

  # ── Security ──
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Scan for dangerous patterns
        run: |
          if grep -r 'syscall(59' lib/ 2>/dev/null | grep -v process.cyr | grep -v agnosys; then
            echo "WARN: raw execve outside process.cyr/agnosys"
          fi
          echo "security scan complete"

  # ── Benchmarks ──
  benchmarks:
    name: Benchmarks
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup compiler
        run: chmod +x build/cc5
      - name: Benchmark suite (tier 1+2)
        run: sh scripts/bench-history.sh --tier2
      - name: Upload benchmark artifacts
        uses: actions/upload-artifact@v4
        with:
          name: benchmarks
          path: |
            bench-history.csv
            BENCHMARKS.md
          retention-days: 90

  # ── Tests (ubuntu) ──
  test:
    name: Test (ubuntu)
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup compiler
        run: |
          chmod +x build/cc5
          cat cbt/cyrius.cyr | ./build/cc5 > ./build/cyrius 2>/dev/null && chmod +x ./build/cyrius
          # cyrld is needed by tests/regression-linker.sh + the
          # v5.4.9 _cyrius_init handshake gate further down. Build
          # it from source against the just-verified cc5 so the
          # gate exercises the same toolchain the rest of the job
          # does, not whatever was last committed to build/cyrld.
          cat programs/cyrld.cyr | ./build/cc5 > ./build/cyrld 2>/dev/null && chmod +x ./build/cyrld
      - name: Resolve dependencies
        run: |
          chmod +x scripts/cyrius
          ./scripts/cyrius deps
      - name: Heap map audit
        run: sh tests/heapmap.sh
      - name: Test suite (.tcyr)
        run: |
          pass=0; fail=0
          for t in tests/tcyr/*.tcyr; do
            name=$(basename "$t" .tcyr)
            tmpbin="/tmp/ci_t_$$"
            cat "$t" | ./build/cc5 > "$tmpbin" 2>/dev/null && chmod +x "$tmpbin"
            if [ $? -ne 0 ]; then echo "FAIL (compile): $name"; fail=$((fail+1)); continue; fi
            output=$("$tmpbin" 2>&1) && ec=0 || ec=$?
            rm -f "$tmpbin"
            f=$(echo "$output" | grep -o '[0-9]* failed' | tail -1 | grep -o '^[0-9]*')
            if [ "$ec" -ne 0 ] || { [ -n "$f" ] && [ "$f" -gt 0 ]; }; then
              echo "FAIL: $name"; fail=$((fail+1))
            else
              echo "PASS: $name"; pass=$((pass+1))
            fi
          done
          echo "$pass passed, $fail failed"
          test $fail -eq 0
      - name: Regression — _cyrius_init STB_GLOBAL in object; mode (v5.4.9)
        run: |
          # Mabda's GPU integration links a cyrius `.o` into a
          # C-launcher binary; that requires `_cyrius_init` to be
          # GLOBAL so the system linker can resolve external refs.
          # v3.4.14 had this right; v4.6.0-alpha2 silently flipped
          # it back to STB_LOCAL on a cyrld-multi-module worry that
          # cyrld actually handles per-module via `find_local_sym`.
          # v5.4.9 re-flipped to GLOBAL + taught cyrld to skip the
          # symbol from its dup-check. This gate is the tripwire so
          # the next silent flip can't ship.
          sh tests/regression-object-init.sh
      - name: Regression — cyrld multi-module link
        run: |
          # Companion gate: cyrld must still link multi-module
          # programs after the v5.4.9 GLOBAL flip. Catches any
          # regression in the dup-symbol-skip handshake between
          # cc5 (`src/backend/x86/fixup.cyr`) and cyrld
          # (`programs/cyrld.cyr` `merge_symbols`).
          if [ -x build/cyrld ]; then
            sh tests/regression-linker.sh
          else
            echo "skip: build/cyrld not present"
          fi
      - name: Regression — shared object (.so + dlopen)
        run: sh tests/regression-shared.sh
      - name: Regression — cyrius capacity meter
        run: sh tests/regression-capacity.sh

  # ── Tests (AGNOS) ──
  test-agnos:
    name: Test (AGNOS)
    needs: [build]
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/maccracken/agnosticos:2026.3.31
      options: --user root
    steps:
      - uses: actions/checkout@v4
      - name: Setup compiler
        run: |
          chmod +x build/cc5
          cat cbt/cyrius.cyr | ./build/cc5 > ./build/cyrius 2>/dev/null && chmod +x ./build/cyrius || true
          if command -v git >/dev/null 2>&1; then
            chmod +x scripts/cyrius
            ./scripts/cyrius deps
          else
            echo "git not available, skipping dep resolution"
          fi
      - name: Test suite (.tcyr)
        run: |
          pass=0; fail=0
          for t in tests/tcyr/*.tcyr; do
            # Skip tests requiring deps if deps not resolved
            name=$(basename "$t" .tcyr)
            case "$name" in sakshi|sakshi_full) [ ! -f lib/sakshi.cyr ] && echo "SKIP: $name (no deps)" && continue ;; esac
            name=$(basename "$t" .tcyr)
            tmpbin="/tmp/ci_t_$$"
            cat "$t" | ./build/cc5 > "$tmpbin" 2>/dev/null && chmod +x "$tmpbin"
            if [ $? -ne 0 ]; then echo "FAIL (compile): $name"; fail=$((fail+1)); continue; fi
            output=$("$tmpbin" 2>&1) && ec=0 || ec=$?
            rm -f "$tmpbin"
            f=$(echo "$output" | grep -o '[0-9]* failed' | tail -1 | grep -o '^[0-9]*')
            if [ "$ec" -ne 0 ] || { [ -n "$f" ] && [ "$f" -gt 0 ]; }; then
              echo "FAIL: $name"; fail=$((fail+1))
            else
              echo "PASS: $name"; pass=$((pass+1))
            fi
          done
          echo "$pass passed, $fail failed"
          test $fail -eq 0

  # ── aarch64 ──
  aarch64:
    name: aarch64 Cross
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install qemu-user
        run: sudo apt-get update && sudo apt-get install -y qemu-user-static
      - name: Setup compilers
        run: |
          chmod +x build/cc5
          echo "build/cc5: $(wc -c < ./build/cc5) bytes"
          echo "build/cc5 md5: $(md5sum build/cc5 | cut -d' ' -f1)"
          echo "lex.cyr md5: $(md5sum src/frontend/lex.cyr | cut -d' ' -f1)"
          ./build/cc5 --version || echo "cc5 --version failed with exit $?"
          cat src/main_aarch64.cyr | ./build/cc5 > ./build/cc5_aarch64 && chmod +x ./build/cc5_aarch64
          echo "cc5_aarch64: $(wc -c < ./build/cc5_aarch64) bytes"
      - name: aarch64 tests
        run: |
          pass=0; fail=0
          for test in \
            "literal:var x = 42;:42" \
            "add:var x = 20 + 22;:42" \
            "sub:var x = 50 - 8;:42" \
            "mul:var x = 6 * 7;:42" \
            "div:var x = 84 / 2;:42" \
            "mod:var r = 10 % 3;:1" \
            "precedence:var x = 2 + 5 * 8;:42" \
            "if:var x = 0; if (1 == 1) { x = 42; }:42" \
            "if_else:var x = 0; if (0 == 1) { x = 0; } else { x = 42; }:42" \
            "while:var x = 0; while (x < 10) { x = x + 1; }:10" \
            "for:var s = 0; for (var i = 1; i <= 10; i = i + 1) { s = s + i; } var r = s;:55" \
            "break:var i = 0; while (i < 100) { if (i == 42) { break; } i = i + 1; }:42" \
            "fn:fn f(a, b) { return a + b; } var x = f(20, 22);:42" \
            "fn_recurse:fn fib(n) { if (n <= 1) { return n; } return fib(n-1) + fib(n-2); } var r = fib(7);:13" \
            "fn_6args:fn f(a,b,c,d,e,g) { return a+b+c+d+e+g; } var r = f(1,2,3,4,5,27);:42" \
            "enum:enum E { A = 10; B = 42; } fn f() { return B; } var r = f();:42" \
            "struct:struct P { x; y; } var p = P { 20, 22 }; var r = p.x + p.y;:42" \
            "syscall:syscall(1, 1, \"ok\", 2); var r = 42;:42" \
            "and:var r = 0xFF & 0x2A;:42" \
            "or:var r = 0x20 | 0x0A;:42" \
            "xor:var r = 0xFF ^ 0xD5;:42" \
            "shl:var r = 21 << 1;:42" \
            "shr:var r = 84 >> 1;:42" \
            "store_load:var buf[2]; store64(&buf, 42); var r = load64(&buf);:42" \
            "store8:var buf[2]; store8(&buf, 42); var r = load8(&buf);:42" \
            "complex:fn max(a,b) { if (a > b) { return a; } return b; } fn min(a,b) { if (a < b) { return a; } return b; } var r = max(min(50, 42), 10);:42"
          do
            name=$(echo "$test" | cut -d: -f1)
            code=$(echo "$test" | cut -d: -f2)
            expected=$(echo "$test" | cut -d: -f3)
            echo "$code" | ./build/cc5_aarch64 > /tmp/a64_t && chmod +x /tmp/a64_t
            result=$(timeout 5 qemu-aarch64-static /tmp/a64_t >/dev/null 2>&1; echo $?)
            if [ "$result" = "$expected" ]; then pass=$((pass+1)); else echo "FAIL: $name"; fail=$((fail+1)); fi
          done
          echo "$pass passed, $fail failed"
          test $fail -eq 0

  # ── macOS Mach-O ──
  macho:
    name: Mach-O Cross
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup compiler
        run: |
          chmod +x build/cc5
      - name: Mach-O compilation tests
        run: |
          pass=0; fail=0
          for test in \
            "exit42:include \"lib/syscalls_macos.cyr\"\nsyscall(SYS_EXIT, 42);" \
            "write:include \"lib/syscalls_macos.cyr\"\nsyscall(SYS_WRITE, 1, \"ok\", 2);\nsyscall(SYS_EXIT, 0);" \
            "vars:include \"lib/syscalls_macos.cyr\"\nvar x = 20 + 22;\nsyscall(SYS_EXIT, x);" \
            "fn:include \"lib/syscalls_macos.cyr\"\nfn f(a, b) { return a + b; }\nsyscall(SYS_EXIT, f(20, 22));"
          do
            name=$(echo "$test" | cut -d: -f1)
            code=$(echo "$test" | cut -d: -f2-)
            printf "$code" | CYRIUS_MACHO=1 ./build/cc5 2>/dev/null > /tmp/macho_test
            # Verify: non-empty, Mach-O magic (FEEDFACF little-endian = CF FA ED FE)
            sz=$(wc -c < /tmp/macho_test)
            magic=$(xxd -l4 -p /tmp/macho_test)
            if [ "$sz" -gt 0 ] && [ "$magic" = "cffa edfe" -o "$magic" = "cffaedfe" ]; then
              pass=$((pass+1))
            else
              echo "FAIL: $name (size=$sz magic=$magic)"
              fail=$((fail+1))
            fi
          done
          echo "$pass passed, $fail failed"
          test $fail -eq 0
      - name: Mach-O file identification
        run: |
          echo 'include "lib/syscalls_macos.cyr"
          syscall(SYS_WRITE, 1, "hello\n", 6);
          syscall(SYS_EXIT, 0);' | CYRIUS_MACHO=1 ./build/cc5 2>/dev/null > /tmp/macho_id
          file /tmp/macho_id | grep -q "Mach-O 64-bit x86_64"

  # ── macOS Apple Silicon (arm64) — static verification ──
  # Compiles arm64 Mach-O binaries with the cross-compiler on ubuntu
  # and verifies the file structure. Runtime verification happens in
  # macho-arm64-native on a macos-14 runner.
  macho-arm64:
    name: Mach-O ARM64 Cross
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup cross-compiler
        run: |
          chmod +x build/cc5
          cat src/main_aarch64.cyr | ./build/cc5 > ./build/cc5_aarch64 && chmod +x ./build/cc5_aarch64
          echo "cc5_aarch64: $(wc -c < ./build/cc5_aarch64) bytes"
      - name: Mach-O ARM64 compilation tests
        run: |
          mkdir -p /tmp/macho_arm_out
          pass=0; fail=0
          # Covers v5.3.0 (syscall-only) + v5.3.1 (strings, globals)
          for test in \
            "exit42:syscall(60, 42);" \
            "write:syscall(1, 1, \"ok\", 2); syscall(60, 0);" \
            "string_literal:syscall(1, 1, \"hi\\n\", 3); syscall(60, 0);" \
            "global_var:var msg = \"hello\\n\"; syscall(1, 1, msg, 6); syscall(60, 0);" \
            "multi_var:var a = 10; var b = 32; syscall(60, a + b);" \
            "var_plus_string:var m = \"ok\\n\"; var n = 3; syscall(1, 1, m, n); syscall(60, 0);"
          do
            name=$(echo "$test" | cut -d: -f1)
            code=$(echo "$test" | cut -d: -f2-)
            out="/tmp/macho_arm_out/$name.macho"
            printf "$code\n" | CYRIUS_MACHO_ARM=1 ./build/cc5_aarch64 2>/dev/null > "$out"
            sz=$(wc -c < "$out")
            magic=$(xxd -l4 -p "$out" | tr -d ' \n')
            cputype=$(xxd -s4 -l4 -p "$out" | tr -d ' \n')
            # Mach-O LE magic = cffaedfe, CPU_TYPE_ARM64 (0x0100000C) LE = 0c000001
            if [ "$sz" -gt 0 ] && [ "$magic" = "cffaedfe" ] && [ "$cputype" = "0c000001" ]; then
              pass=$((pass+1))
            else
              echo "FAIL: $name (size=$sz magic=$magic cputype=$cputype)"
              fail=$((fail+1))
            fi
          done
          echo "$pass passed, $fail failed"
          test $fail -eq 0
      - name: Mach-O ARM64 file identification
        run: |
          file /tmp/macho_arm_out/exit42.macho | grep -q "arm64"
      - name: Verify MH_PIE flag (0x00200085) is set
        run: |
          # mach_header_64.flags at offset 24-27 (LE = 85 00 20 00)
          for f in /tmp/macho_arm_out/*.macho; do
            flags=$(xxd -s24 -l4 -p "$f" | tr -d ' \n')
            test "$flags" = "85002000" || {
              echo "FAIL: $(basename $f) flags=$flags (expected 85002000)"
              exit 1
            }
          done
          echo "PASS: MH_PIE|MH_DYLDLINK|MH_TWOLEVEL|MH_NOUNDEFS on all binaries"
      - name: Upload arm64 Mach-O binaries for native run
        uses: actions/upload-artifact@v4
        with:
          name: macho-arm64-binaries
          path: /tmp/macho_arm_out/
          retention-days: 7

  # ── macOS Apple Silicon (arm64) — native run ──
  # Downloads binaries from macho-arm64, codesigns ad-hoc, and runs them on
  # a real Apple Silicon runner. Validates the v5.3.1 hello-world path
  # end-to-end against the macOS kernel's MH_PIE, codesign, and dyld gates.
  macho-arm64-native:
    name: Mach-O ARM64 Native
    needs: [macho-arm64]
    runs-on: macos-14
    steps:
      - name: Download arm64 Mach-O binaries
        uses: actions/download-artifact@v4
        with:
          name: macho-arm64-binaries
          path: ./macho-arm64
      - name: Codesign and run exit42 (v5.3.0 scope)
        run: |
          chmod +x ./macho-arm64/exit42.macho
          codesign -s - --force ./macho-arm64/exit42.macho
          # Capture exit code without tripping bash -e on the non-zero exit.
          ./macho-arm64/exit42.macho && ec=0 || ec=$?
          test $ec -eq 42 || { echo "exit42: expected 42, got $ec"; exit 1; }
          echo "PASS: exit42 → $ec"
      - name: Codesign and run write (v5.3.0 scope)
        run: |
          chmod +x ./macho-arm64/write.macho
          codesign -s - --force ./macho-arm64/write.macho
          out=$(./macho-arm64/write.macho) && ec=0 || ec=$?
          test $ec -eq 0 || { echo "write: expected exit 0, got $ec"; exit 1; }
          test "$out" = "ok" || { echo "write: expected 'ok', got '$out'"; exit 1; }
          echo "PASS: write → 'ok' (exit 0)"
      - name: Codesign and run string_literal (v5.3.1 scope)
        run: |
          chmod +x ./macho-arm64/string_literal.macho
          codesign -s - --force ./macho-arm64/string_literal.macho
          out=$(./macho-arm64/string_literal.macho) && ec=0 || ec=$?
          test $ec -eq 0 || { echo "string_literal: expected exit 0, got $ec"; exit 1; }
          test "$out" = "hi" || { echo "string_literal: expected 'hi', got '$out'"; exit 1; }
          echo "PASS: string_literal → 'hi' (exit 0)"
      - name: Codesign and run global_var (v5.3.1 scope)
        run: |
          chmod +x ./macho-arm64/global_var.macho
          codesign -s - --force ./macho-arm64/global_var.macho
          out=$(./macho-arm64/global_var.macho) && ec=0 || ec=$?
          test $ec -eq 0 || { echo "global_var: expected exit 0, got $ec"; exit 1; }
          test "$out" = "hello" || { echo "global_var: expected 'hello', got '$out'"; exit 1; }
          echo "PASS: global_var → 'hello' (exit 0)"
      - name: Codesign and run var_plus_string (v5.3.1 scope)
        run: |
          chmod +x ./macho-arm64/var_plus_string.macho
          codesign -s - --force ./macho-arm64/var_plus_string.macho
          out=$(./macho-arm64/var_plus_string.macho) && ec=0 || ec=$?
          test $ec -eq 0 || { echo "var_plus_string: expected exit 0, got $ec"; exit 1; }
          test "$out" = "ok" || { echo "var_plus_string: expected 'ok', got '$out'"; exit 1; }
          echo "PASS: var_plus_string → 'ok' (exit 0)"

  # ── Windows x86_64 PE32+ cross-compile ──
  # Runs on ubuntu-latest; compiles exit-code programs with
  # CYRIUS_TARGET_WIN=1 and uploads the .exe artifacts so the
  # windows-native job can execute them on real Windows. Validates
  # v5.4.2 (structural PE32+), v5.4.3 (EEXIT → ExitProcess via IAT
  # fixup), and v5.4.4 (syscall(60) reroute) at the compiler level.
  windows-cross:
    name: Windows PE32+ Cross
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup compiler
        run: chmod +x build/cc5
      - name: Compile exit-code PE32+ test binaries
        run: |
          mkdir -p /tmp/win_out
          pass=0; fail=0
          # Each test: "name:source:expected_errorlevel"
          # Exercises syscall(60) reroute (v5.4.4) + EEXIT Win64 branch
          # (v5.4.3) + IAT fixup (v5.4.3) + structural PE32+ (v5.4.2).
          for test in \
            "exit0:syscall(60, 0);:0" \
            "exit1:syscall(60, 1);:1" \
            "exit42:syscall(60, 42);:42" \
            "exit255:syscall(60, 255);:255"
          do
            name=$(echo "$test" | cut -d: -f1)
            code=$(echo "$test" | cut -d: -f2)
            expected=$(echo "$test" | cut -d: -f3)
            out="/tmp/win_out/$name.exe"
            printf "$code\n" | CYRIUS_TARGET_WIN=1 ./build/cc5 2>/dev/null > "$out"
            sz=$(wc -c < "$out")
            # Validate PE32+ signature at container level
            magic=$(xxd -l2 -p "$out" | tr -d ' \n')
            pesig=$(xxd -s64 -l4 -p "$out" | tr -d ' \n')
            machine=$(xxd -s68 -l2 -p "$out" | tr -d ' \n')
            if [ "$sz" -gt 0 ] \
                && [ "$magic" = "4d5a" ] \
                && [ "$pesig" = "50450000" ] \
                && [ "$machine" = "6486" ]; then
              pass=$((pass+1))
              # Stash expected errorlevel for the native-run step to pick up
              echo "$expected" > "/tmp/win_out/$name.expected"
            else
              echo "FAIL cross: $name (size=$sz magic=$magic pesig=$pesig machine=$machine)"
              fail=$((fail+1))
            fi
          done
          echo "cross: $pass passed, $fail failed"
          test $fail -eq 0
      - name: Assert zero Linux `0F 05` syscall bytes in `.text`
        run: |
          # v5.4.4 gate: compiled syscall(60,N) must route to the Win64
          # ExitProcess call, not the Linux `0F 05` syscall instruction.
          for f in /tmp/win_out/*.exe; do
            # Grep the full file; .text is always past header (offset 0x200+)
            # and the IAT disp32 follows `FF 15` not `0F 05`, so any `0F 05`
            # byte pair would be a regression.
            if xxd -p "$f" | tr -d '\n' | grep -qE '0f05'; then
              echo "FAIL: $(basename $f) contains 0F 05 (Linux syscall) bytes"
              exit 1
            fi
          done
          echo "PASS: no Linux syscall bytes in any PE32+ output"
      - name: v5.5.3 Win64 ABI fncall gate (≤4 args)
        run: |
          # v5.5.3: internal cyrius-to-cyrius fn calls under _TARGET_PE
          # use Win64 arg registers (RCX/RDX/R8/R9) instead of SysV
          # (RDI/RSI/RDX/RCX). EPOPARG flips to Win64 encoding under
          # _TARGET_PE; ESTOREREGPARM symmetrically flips the callee-
          # side spill. Scope limited to ≤4 args; >4-arg stack shuttle
          # + shadow-space enforcement queued for v5.5.4.
          pass=0; fail=0
          # arg{N} covers the N-arg fn; nested exercises fn-calling-fn.
          for test in \
            "w_arg1:fn f(a){return a*7;} syscall(60, f(6));:42" \
            "w_arg2:fn f(a,b){return a+b;} syscall(60, f(30, 12));:42" \
            "w_arg3:fn f(a,b,c){return a*b+c;} syscall(60, f(6, 5, 12));:42" \
            "w_arg4:fn f(a,b,c,d){return a+b+c+d;} syscall(60, f(10, 20, 3, 9));:42" \
            "w_nested:fn g(x){return x+1;} fn f(a,b){return g(a)+g(b);} syscall(60, f(19, 21));:42"
          do
            name=$(echo "$test" | cut -d: -f1)
            code=$(echo "$test" | cut -d: -f2)
            expected=$(echo "$test" | cut -d: -f3)
            out="/tmp/win_out/$name.exe"
            printf "%s\n" "$code" | CYRIUS_TARGET_WIN=1 ./build/cc5 2>/dev/null > "$out"
            sz=$(wc -c < "$out")
            magic=$(xxd -l2 -p "$out" | tr -d ' \n')
            pesig=$(xxd -s64 -l4 -p "$out" | tr -d ' \n')
            if [ "$sz" -gt 0 ] && [ "$magic" = "4d5a" ] && [ "$pesig" = "50450000" ]; then
              pass=$((pass+1))
              echo "$expected" > "/tmp/win_out/$name.expected"
            else
              echo "FAIL cross: $name (size=$sz magic=$magic pesig=$pesig)"
              fail=$((fail+1))
            fi
          done
          # Byte-level gate: w_arg4 must contain the Win64 spill quartet
          # (mov [rbp+disp], rcx/rdx/r8/r9). If EPOPARG/ESTOREREGPARM
          # drifts back to SysV we'd see rdi/rsi markers instead.
          if ! xxd -p /tmp/win_out/w_arg4.exe | tr -d '\n' | grep -qE '48898d[0-9a-f]{8}4889[0-9a-f]{2}[0-9a-f]{8}4c8985[0-9a-f]{8}4c898d'; then
            echo "FAIL: w_arg4.exe missing Win64 spill quartet (rcx/rdx/r8/r9)"
            exit 1
          fi
          echo "Win64 fncall cross: $pass passed, $fail failed"
          test $fail -eq 0
      - name: v5.5.4 Win64 ABI fncall gate (>4 args)
        run: |
          # v5.5.4: cyrius-to-cyrius fn calls with 5-8 args under
          # CYRIUS_TARGET_WIN=1. ECALLPOPS shuttles extras via
          # r10/r11/r14/r15, pops register args, then writes extras
          # to [rsp+0..(nextra-1)*8]. ECALLCLEAN unwinds. ESTOREPARM
          # dispatch boundary flips to pidx<4 under _TARGET_PE;
          # ESTORESTACKPARM reads pidx>=4 from [rbp+16+(pidx-4)*8].
          # No shadow space — cyrius callees don't use it.
          pass=0; fail=0
          for test in \
            "w_arg5:fn f(a,b,c,d,e){return a+b+c+d+e;} syscall(60, f(10, 20, 3, 8, 1));:42" \
            "w_arg6:fn f(a,b,c,d,e,g){return a+b+c+d+e+g;} syscall(60, f(10, 20, 3, 5, 2, 2));:42" \
            "w_arg7:fn f(a,b,c,d,e,g,h){return a+b+c+d+e+g+h;} syscall(60, f(10, 10, 10, 5, 3, 2, 2));:42" \
            "w_arg8:fn f(a,b,c,d,e,g,h,i){return a+b+c+d+e+g+h+i;} syscall(60, f(5, 5, 5, 5, 10, 6, 3, 3));:42" \
            "w_arg5_order:fn f(a,b,c,d,e){return a-b-c-d-e;} syscall(60, f(100, 10, 20, 13, 15));:42"
          do
            name=$(echo "$test" | cut -d: -f1)
            code=$(echo "$test" | cut -d: -f2)
            expected=$(echo "$test" | cut -d: -f3)
            out="/tmp/win_out/$name.exe"
            printf "%s\n" "$code" | CYRIUS_TARGET_WIN=1 ./build/cc5 2>/dev/null > "$out"
            sz=$(wc -c < "$out")
            magic=$(xxd -l2 -p "$out" | tr -d ' \n')
            pesig=$(xxd -s64 -l4 -p "$out" | tr -d ' \n')
            if [ "$sz" -gt 0 ] && [ "$magic" = "4d5a" ] && [ "$pesig" = "50450000" ]; then
              pass=$((pass+1))
              echo "$expected" > "/tmp/win_out/$name.expected"
            else
              echo "FAIL cross: $name (size=$sz magic=$magic pesig=$pesig)"
              fail=$((fail+1))
            fi
          done
          # Byte-level gate: w_arg5.exe must contain the shuttle's
          # `pop rax; mov r10, rax` = `58 49 89 C2` sequence. If the
          # middle byte-order typo that bit during development
          # (v5.5.4-alpha) regresses, we'd see `58 89 49 C2` instead.
          if ! xxd -p /tmp/win_out/w_arg5.exe | tr -d '\n' | grep -qE '58498[9]c2'; then
            echo "FAIL: w_arg5.exe missing shuttle 'pop rax; mov r10, rax' (58 49 89 C2)"
            exit 1
          fi
          echo "Win64 >4-arg fncall cross: $pass passed, $fail failed"
          test $fail -eq 0
      - name: v5.5.5 `&fn` PE VA fixup gate
        run: |
          # v5.5.5: address-of-fn (`&fn`) under CYRIUS_TARGET_WIN=1
          # must emit a `movabs rax, imm64` with imm64 in the PE VA
          # range [0x140000000, 0x200000000). Pre-v5.5.5 emitted an
          # ELF-style VA (e.g. 0x4000d8) which Windows rejects at
          # load time with error 216 ("not compatible"). Fix was a
          # 3-line PE branch in src/backend/x86/fixup.cyr ftype=3
          # mirroring the existing ftype=1 string-address guard.
          printf 'fn f() { return 42; } var fp = &f; syscall(60, 0);\n' \
            | CYRIUS_TARGET_WIN=1 ./build/cc5 2>/dev/null > /tmp/win_out/w_fnaddr.exe
          sz=$(wc -c < /tmp/win_out/w_fnaddr.exe)
          test "$sz" -gt 0 || { echo "FAIL: w_fnaddr.exe empty"; exit 1; }
          # Scan .text (file offset 0x200+) for `48 B8 <imm64>` and
          # assert imm64 lives in the PE VA range. A single hit is
          # sufficient; fail on any ELF-range leak.
          python3 -c "
          d=open('/tmp/win_out/w_fnaddr.exe','rb').read()
          found = False
          for i in range(0x200, min(0x800, len(d)-10)):
              if d[i]==0x48 and d[i+1]==0xB8:
                  imm=int.from_bytes(d[i+2:i+10],'little')
                  if 0x140000000 <= imm < 0x200000000:
                      print(f'PASS: &fn movabs rax, 0x{imm:x} (PE VA)')
                      found = True
                  else:
                      raise SystemExit(f'FAIL: &fn movabs imm=0x{imm:x} outside PE VA range')
          if not found: raise SystemExit('FAIL: no movabs in .text')
          "
          echo "0" > /tmp/win_out/w_fnaddr.expected
          echo "PASS: v5.5.5 &fn PE VA gate"
      - name: v5.5.6 `lib/fnptr.cyr` Win64 `fncallN` gate
        run: |
          # v5.5.6: indirect fn-pointer calls via fncall0..fncall8
          # under CYRIUS_TARGET_WIN=1 must use Win64 arg registers
          # (RCX/RDX/R8/R9) and place args 5+ at [rsp+0..] in the
          # no-shadow layout v5.5.4 established for cyrius-to-cyrius
          # calls. Pre-fix the CYRIUS_ARCH_X86 SysV block was always
          # active and crashed or returned garbage on Windows.
          # v5.5.6 also bumped v5.5.4's ECALLPOPS nextra ceiling
          # from 4→5 so fncall8 (9-arg) works.
          # Also requires v5.5.6's main.cyr env-var predefine of
          # CYRIUS_TARGET_WIN before PREPROCESS so #ifdef guards fire.
          pass=0; fail=0
          for test in \
            "w_fnptr0:fn f(){return 42;} syscall(60, fncall0(&f));:42" \
            "w_fnptr1:fn f(a){return a*2;} syscall(60, fncall1(&f, 21));:42" \
            "w_fnptr2:fn f(a,b){return a+b;} syscall(60, fncall2(&f, 30, 12));:42" \
            "w_fnptr3:fn f(a,b,c){return a*b+c;} syscall(60, fncall3(&f, 6, 5, 12));:42" \
            "w_fnptr4:fn f(a,b,c,d){return a+b+c+d;} syscall(60, fncall4(&f, 10, 20, 3, 9));:42" \
            "w_fnptr5:fn f(a,b,c,d,e){return a+b+c+d+e;} syscall(60, fncall5(&f, 10, 20, 3, 8, 1));:42" \
            "w_fnptr6:fn f(a,b,c,d,e,g){return a+b+c+d+e+g;} syscall(60, fncall6(&f, 10, 20, 3, 5, 2, 2));:42" \
            "w_fnptr7:fn f(a,b,c,d,e,g,h){return a+b+c+d+e+g+h;} syscall(60, fncall7(&f, 10, 10, 10, 5, 3, 2, 2));:42" \
            "w_fnptr8:fn f(a,b,c,d,e,g,h,i){return a+b+c+d+e+g+h+i;} syscall(60, fncall8(&f, 5, 5, 5, 5, 10, 6, 3, 3));:42"
          do
            name=$(echo "$test" | cut -d: -f1)
            code=$(echo "$test" | cut -d: -f2)
            expected=$(echo "$test" | cut -d: -f3)
            out="/tmp/win_out/$name.exe"
            printf 'include "lib/fnptr.cyr"\n%s\n' "$code" \
              | CYRIUS_TARGET_WIN=1 ./build/cc5 2>/dev/null > "$out"
            sz=$(wc -c < "$out")
            if [ "$sz" -gt 0 ]; then
              pass=$((pass+1))
              echo "$expected" > "/tmp/win_out/$name.expected"
            else
              echo "FAIL cross: $name"
              fail=$((fail+1))
            fi
          done
          echo "Win64 fnptr cross: $pass passed, $fail failed"
          test $fail -eq 0
      - name: v5.5.7 strict Win64 shadow-space compliance gate
        run: |
          # v5.5.7: every cyrius-to-cyrius call site under _TARGET_PE
          # allocates 32 B shadow (plus stack-arg space for N>4).
          # Byte-level: the `sub rsp, 0x20` pattern (48 83 EC 20)
          # must appear immediately after every call-site arg-pop
          # sequence. We check the 4-arg test — its emitted code
          # should end pops with `pop rcx` (59) immediately followed
          # by `sub rsp, 0x20` (48 83 EC 20).
          # Also the w_arg4 fn body's fn-call path before the
          # outer syscall exit should have the same pattern.
          if ! xxd -p /tmp/win_out/w_arg4.exe | tr -d '\n' | grep -qE '594883ec20'; then
            echo "FAIL: w_arg4.exe missing shadow-space pattern (pop rcx + sub rsp, 0x20)"
            exit 1
          fi
          # fnptr path: w_fnptr0 (no-args fnptr) should have sub rsp, 0x20
          # immediately before the call rax indirection.
          if ! xxd -p /tmp/win_out/w_fnptr0.exe | tr -d '\n' | grep -qE '4883ec20488b45f8ffd04883c420'; then
            echo "FAIL: w_fnptr0.exe fncall0 missing strict Win64 shadow prologue"
            exit 1
          fi
          echo "PASS: v5.5.7 strict Win64 shadow gate"
      - name: v5.4.7/v5.4.8 hello-world structural + data-placement gate
        run: |
          # Compile a syscall(1) hello-world program and verify:
          #   (a) structurally valid PE32+ with 3 sections including `.rdata`,
          #   (b) imports GetStdHandle + WriteFile + ExitProcess,
          #   (c) zero Linux `0F 05` syscall bytes,
          #   (d) string bytes live in `.rdata` (not floating in free space),
          #   (e) the compiled movabs targets `0x140…` (PE VA), not
          #       `0x400…` (ELF VA) — v5.4.8 data-placement regression gate.
          printf 'syscall(1, 1, "hi\\n", 3); syscall(60, 0);\n' \
            | CYRIUS_TARGET_WIN=1 ./build/cc5 2>/dev/null > /tmp/win_out/hello.exe
          sz=$(wc -c < /tmp/win_out/hello.exe)
          magic=$(xxd -l2 -p /tmp/win_out/hello.exe | tr -d ' \n')
          machine=$(xxd -s68 -l2 -p /tmp/win_out/hello.exe | tr -d ' \n')
          nsec=$(python3 -c "import sys; d=open('/tmp/win_out/hello.exe','rb').read(); print(int.from_bytes(d[0x46:0x48],'little'))")
          test "$sz" -gt 0 && test "$magic" = "4d5a" && test "$machine" = "6486" && test "$nsec" = "3" || {
            echo "FAIL: hello.exe structural (sz=$sz magic=$magic machine=$machine nsec=$nsec)"; exit 1;
          }
          if xxd -p /tmp/win_out/hello.exe | tr -d '\n' | grep -qE '0f05'; then
            echo "FAIL: hello.exe contains 0F 05"; exit 1
          fi
          for sym in ExitProcess GetStdHandle WriteFile kernel32.dll; do
            if ! grep -a -q "$sym" /tmp/win_out/hello.exe; then
              echo "FAIL: hello.exe missing import: $sym"; exit 1
            fi
          done
          python3 -c "
          d=open('/tmp/win_out/hello.exe','rb').read()
          for i in range(0x200, 0x400-10):
              if d[i]==0x48 and d[i+1]==0xB8:
                  imm=int.from_bytes(d[i+2:i+10],'little')
                  assert 0x140000000 <= imm < 0x200000000, f'movabs imm=0x{imm:x} not in PE VA range'
                  print(f'PASS: movabs rax, 0x{imm:x} (PE VA)')
                  break
          else:
              raise SystemExit('FAIL: no movabs in .text')
          "
          echo "hi" > /tmp/win_out/hello.expected_stdout
          echo "0"  > /tmp/win_out/hello.expected
          echo "PASS: v5.4.8 PE data placement gate"
      - name: Upload PE32+ binaries for native run
        uses: actions/upload-artifact@v4
        with:
          name: windows-pe-binaries
          path: /tmp/win_out/
          retention-days: 7

  # ── Windows x86_64 native run ──
  # Downloads the cross-compiled .exe binaries, runs them on a real
  # windows-latest runner, and verifies ERRORLEVEL matches. This is
  # the on-hardware gate for the v5.4.x Windows arc.
  windows-native:
    name: Windows PE32+ Native
    needs: [windows-cross]
    runs-on: windows-latest
    steps:
      - name: Download PE32+ binaries
        uses: actions/download-artifact@v4
        with:
          name: windows-pe-binaries
          path: ./win
      - name: Run hello-world on Windows (v5.4.8 end-to-end gate)
        shell: pwsh
        run: |
          # v5.4.8 on-hardware gate: compiled syscall(1, 1, "hi\n", 3);
          # syscall(60, 0); must print "hi" and exit 0 on a real Windows
          # runner. Validates that the movabs-patched PE VA resolves to
          # the `.rdata` section's "hi\n" bytes and WriteFile succeeds.
          $exe = ".\win\hello.exe"
          $expectedStdout = (Get-Content ".\win\hello.expected_stdout" -Raw).Trim()
          $expectedExit = [int](Get-Content ".\win\hello.expected" -Raw).Trim()
          $stdoutFile = ".\win\hello.stdout"
          $proc = Start-Process -FilePath $exe -Wait -PassThru `
                                -NoNewWindow -RedirectStandardOutput $stdoutFile
          $actualStdout = (Get-Content $stdoutFile -Raw).Trim()
          if ($proc.ExitCode -eq $expectedExit -and $actualStdout -eq $expectedStdout) {
            Write-Host "PASS hello: stdout='$actualStdout' exit=$($proc.ExitCode)"
          } else {
            Write-Host "FAIL hello: expected stdout='$expectedStdout' exit=$expectedExit"
            Write-Host "       got stdout='$actualStdout' exit=$($proc.ExitCode)"
            exit 1
          }
      - name: Run exit-code tests on Windows
        shell: pwsh
        run: |
          $pass = 0
          $fail = 0
          # exit{N} = v5.4.x exit-code reroute (no fn calls).
          # w_arg{1..4}/w_nested = v5.5.3 Win64 ≤4-arg gate.
          # w_arg{5..8}/w_arg5_order = v5.5.4 Win64 >4-arg shuttle +
          # ESTOREPARM dispatch + ESTORESTACKPARM shadow-less layout.
          foreach ($name in @("exit0", "exit1", "exit42", "exit255",
                              "w_arg1", "w_arg2", "w_arg3", "w_arg4", "w_nested",
                              "w_arg5", "w_arg6", "w_arg7", "w_arg8", "w_arg5_order",
                              "w_fnaddr",
                              "w_fnptr0", "w_fnptr1", "w_fnptr2", "w_fnptr3", "w_fnptr4",
                              "w_fnptr5", "w_fnptr6", "w_fnptr7", "w_fnptr8")) {
            $exe = ".\win\$name.exe"
            $expected = (Get-Content ".\win\$name.expected" -Raw).Trim()
            $proc = Start-Process -FilePath $exe -Wait -PassThru -NoNewWindow
            if ($proc.ExitCode -eq [int]$expected) {
              Write-Host "PASS ${name}: ERRORLEVEL=$($proc.ExitCode)"
              $pass++
            } else {
              Write-Host "FAIL ${name}: expected $expected, got $($proc.ExitCode)"
              $fail++
            }
          }
          Write-Host "native: $pass passed, $fail failed"
          if ($fail -gt 0) { exit 1 }

  # ── Documentation ──
  doc:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build cyrdoc
        run: |
          chmod +x build/cc5
          cat programs/cyrdoc.cyr | ./build/cc5 > ./build/cyrdoc && chmod +x ./build/cyrdoc
      - name: Doc coverage (stdlib)
        run: |
          total=0
          for f in lib/*.cyr; do
            [ -L "$f" ] && continue
            u=$(./build/cyrdoc --check "$f" 2>&1 | tail -1 | grep -oP '(\d+) undocumented' | grep -oP '^\d+' || echo 0)
            total=$((total + u))
          done
          echo "$total undocumented"
          test $total -eq 0
      - name: Required docs exist
        run: |
          for doc in README.md CHANGELOG.md VERSION CONTRIBUTING.md SECURITY.md LICENSE \
                     docs/tutorial.md docs/cyrius-guide.md docs/stdlib-reference.md docs/faq.md docs/benchmarks.md; do
            test -f "$doc" || { echo "missing: $doc"; exit 1; }
          done
          echo "all documentation present"
