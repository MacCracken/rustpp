name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  AGNOS_IMAGE: ghcr.io/maccracken/agnosticos:2026.3.31

jobs:
  # ── Build ──
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup compiler
        run: chmod +x build/cc2
      - name: Build x86_64 compiler from source
        run: |
          cat src/compiler.cyr | ./build/cc2 > /tmp/cc3 && chmod +x /tmp/cc3
          SZ=$(wc -c < /tmp/cc3)
          echo "cc2 (x86_64): $SZ bytes"
          test $SZ -gt 80000
      - name: Self-hosting verify
        run: |
          cat src/compiler.cyr | /tmp/cc3 > /tmp/cc4
          cmp /tmp/cc3 /tmp/cc4
          echo "PASS: cc2==cc3 byte-identical"
      - name: Build aarch64 cross-compiler
        run: |
          cat src/compiler_aarch64.cyr | ./build/cc2 > ./build/cc2_aarch64 && chmod +x ./build/cc2_aarch64
          echo "cc2_aarch64: $(wc -c < ./build/cc2_aarch64) bytes"
      - name: Build tools
        run: |
          cat programs/cyrfmt.cyr | ./build/cc2 > ./build/cyrfmt && chmod +x ./build/cyrfmt
          cat programs/cyrlint.cyr | ./build/cc2 > ./build/cyrlint && chmod +x ./build/cyrlint
          cat programs/cyrdoc.cyr | ./build/cc2 > ./build/cyrdoc && chmod +x ./build/cyrdoc
          cat programs/cyrc.cyr | ./build/cc2 > ./build/cyrc && chmod +x ./build/cyrc
          cat programs/ark.cyr | ./build/cc2 > ./build/ark && chmod +x ./build/ark

  # ── Check & Format ──
  check:
    name: Check & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup
        run: |
          chmod +x build/cc2
          cat programs/cyrfmt.cyr | ./build/cc2 > ./build/cyrfmt && chmod +x ./build/cyrfmt
          cat programs/cyrlint.cyr | ./build/cc2 > ./build/cyrlint && chmod +x ./build/cyrlint
      - name: Format check (stdlib)
        run: |
          fail=0
          for f in lib/*.cyr; do
            ./build/cyrfmt "$f" > /tmp/fmt_check
            if ! diff -q "$f" /tmp/fmt_check > /dev/null 2>&1; then
              echo "needs formatting: $(basename $f)"
              fail=1
            fi
          done
          rm -f /tmp/fmt_check
          test $fail -eq 0
      - name: Lint (stdlib)
        run: |
          total=0
          for f in lib/*.cyr; do
            w=$(./build/cyrlint "$f" 2>&1 | tail -1 | grep -oP '^\d+' || echo 0)
            total=$((total + w))
          done
          echo "$total warnings"
          test $total -eq 0

  # ── Supply Chain ──
  supply-chain:
    name: Supply Chain
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup
        run: |
          chmod +x build/cc2
          cat programs/cyrc.cyr | ./build/cc2 > ./build/cyrc && chmod +x ./build/cyrc
      - name: Vet
        run: |
          for f in programs/ark.cyr programs/cyrb.cyr programs/cyrc.cyr; do
            if [ -f "$f" ]; then ./build/cyrc vet "$f"; fi
          done
      - name: Deny
        run: |
          for f in programs/ark.cyr programs/cyrb.cyr programs/cyrc.cyr; do
            if [ -f "$f" ]; then ./build/cyrc deny "$f"; fi
          done

  # ── Security ──
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Scan for dangerous patterns
        run: |
          if grep -r 'syscall(59' lib/ 2>/dev/null | grep -v process.cyr | grep -v agnosys; then
            echo "WARN: raw execve outside process.cyr/agnosys"
          fi
          echo "security scan complete"

  # ── Tests (ubuntu) ──
  test:
    name: Test (ubuntu)
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Bootstrap (for stage1f)
        run: sh bootstrap/bootstrap.sh
      - name: Setup compiler
        run: chmod +x build/cc2
      - name: Compiler tests (111)
        run: sh tests/compiler.sh ./build/cc2 ./build/stage1f
      - name: Program tests (57)
        run: sh tests/programs.sh ./build/cc2

  # ── Tests (AGNOS) ──
  test-agnos:
    name: Test (AGNOS)
    needs: [build]
    runs-on: ubuntu-latest
    container: ghcr.io/maccracken/agnosticos:2026.3.31
    steps:
      - uses: actions/checkout@v4
      - name: Bootstrap (for stage1f)
        run: sh bootstrap/bootstrap.sh
      - name: Setup compiler
        run: chmod +x build/cc2
      - name: Compiler tests (111)
        run: sh tests/compiler.sh ./build/cc2 ./build/stage1f
      - name: Program tests (57)
        run: sh tests/programs.sh ./build/cc2

  # ── aarch64 ──
  aarch64:
    name: aarch64 Cross
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install qemu-user
        run: sudo apt-get update && sudo apt-get install -y qemu-user-static
      - name: Setup compilers
        run: |
          chmod +x build/cc2
          cat src/compiler_aarch64.cyr | ./build/cc2 > ./build/cc2_aarch64 && chmod +x ./build/cc2_aarch64
      - name: aarch64 tests
        run: |
          pass=0; fail=0
          for test in \
            "literal:var x = 42;:42" \
            "add:var x = 20 + 22;:42" \
            "mul:var x = 6 * 7;:42" \
            "div:var x = 84 / 2;:42" \
            "mod:var r = 10 % 3;:1" \
            "if:var x = 0; if (1 == 1) { x = 42; }:42" \
            "while:var x = 0; while (x < 10) { x = x + 1; }:10" \
            "for:var s = 0; for (var i = 1; i <= 10; i = i + 1) { s = s + i; } var r = s;:55" \
            "fn:fn f(a, b) { return a + b; } var x = f(20, 22);:42" \
            "enum:enum E { A = 10; B = 42; } fn f() { return B; } var r = f();:42" \
            "struct:struct P { x; y; } var p = P { 20, 22 }; var r = p.x + p.y;:42" \
            "syscall:syscall(1, 1, \"ok\", 2); var r = 42;:42"
          do
            name=$(echo "$test" | cut -d: -f1)
            code=$(echo "$test" | cut -d: -f2)
            expected=$(echo "$test" | cut -d: -f3)
            echo "$code" | ./build/cc2_aarch64 > /tmp/a64_t && chmod +x /tmp/a64_t
            result=$(timeout 5 qemu-aarch64-static /tmp/a64_t 2>/dev/null; echo $?)
            if [ "$result" = "$expected" ]; then pass=$((pass+1)); else echo "FAIL: $name"; fail=$((fail+1)); fi
          done
          echo "$pass passed, $fail failed"
          test $fail -eq 0

  # ── Documentation ──
  doc:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build cyrdoc
        run: |
          chmod +x build/cc2
          cat programs/cyrdoc.cyr | ./build/cc2 > ./build/cyrdoc && chmod +x ./build/cyrdoc
      - name: Doc coverage (stdlib)
        run: |
          total=0
          for f in lib/*.cyr; do
            u=$(./build/cyrdoc --check "$f" 2>&1 | tail -1 | grep -oP '(\d+) undocumented' | grep -oP '^\d+' || echo 0)
            total=$((total + u))
          done
          echo "$total undocumented"
          test $total -eq 0
      - name: Required docs exist
        run: |
          for doc in README.md CHANGELOG.md VERSION CONTRIBUTING.md SECURITY.md LICENSE \
                     docs/tutorial.md docs/cyrius-guide.md docs/stdlib-reference.md docs/faq.md docs/benchmarks.md; do
            test -f "$doc" || { echo "missing: $doc"; exit 1; }
          done
          echo "all documentation present"
