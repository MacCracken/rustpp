name: Release

on:
  push:
    tags: ['*']

permissions:
  contents: write

jobs:
  # ── CI Gate (must pass before release) ──
  ci:
    name: CI Gate
    uses: ./.github/workflows/ci.yml

  # ── Build release artifacts ──
  build:
    name: Build Release
    needs: [ci]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify version consistency
        run: |
          FILE_VERSION=$(cat VERSION | tr -d '[:space:]')
          TAG_VERSION="${GITHUB_REF_NAME}"
          if [ "$FILE_VERSION" != "$TAG_VERSION" ]; then
            echo "ERROR: VERSION ($FILE_VERSION) != tag ($TAG_VERSION)"
            exit 1
          fi
          echo "Version verified: $TAG_VERSION"

      - name: Install qemu-user
        run: sudo apt-get update && sudo apt-get install -y qemu-user-static

      - name: Bootstrap + build all
        run: |
          sh bootstrap/bootstrap.sh
          cat stage1/cc2.cyr | ./build/stage1f > ./build/cc2 2>/dev/null || true
          chmod +x ./build/cc2
          cat stage1/cc2_aarch64.cyr | ./build/cc2 > ./build/cc2_aarch64 && chmod +x ./build/cc2_aarch64
          cat stage1/programs/cyrfmt.cyr | ./build/cc2 > ./build/cyrfmt && chmod +x ./build/cyrfmt
          cat stage1/programs/cyrlint.cyr | ./build/cc2 > ./build/cyrlint && chmod +x ./build/cyrlint
          cat stage1/programs/cyrdoc.cyr | ./build/cc2 > ./build/cyrdoc && chmod +x ./build/cyrdoc
          cat stage1/programs/cyrc.cyr | ./build/cc2 > ./build/cyrc && chmod +x ./build/cyrc
          cat stage1/programs/ark.cyr | ./build/cc2 > ./build/ark && chmod +x ./build/ark

      - name: Package artifacts
        run: |
          TAG="${GITHUB_REF_NAME}"
          mkdir -p dist
          for bin in cc2 cc2_aarch64 cyrfmt cyrlint cyrdoc cyrc ark; do
            if [ -x "build/$bin" ]; then
              cp "build/$bin" "dist/"
            fi
          done
          cp scripts/cyrb dist/
          cp scripts/cyrb-init.sh dist/
          cp scripts/install.sh dist/
          cp scripts/check.sh dist/
          cp bootstrap/asm dist/
          cd dist && sha256sum * > SHA256SUMS

      - uses: actions/upload-artifact@v4
        with:
          name: cyrius-${{ github.ref_name }}
          path: dist/

  # ── Create GitHub Release ──
  release:
    name: Create GitHub Release
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: cyrius-${{ github.ref_name }}
          path: dist/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: "Cyrius ${{ github.ref_name }}"
          generate_release_notes: true
          prerelease: ${{ startsWith(github.ref_name, '0.') }}
          files: dist/*
