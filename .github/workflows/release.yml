name: Release

on:
  push:
    tags: ['*']

permissions:
  contents: write

jobs:
  # ── CI Gate (must pass before release) ──
  ci:
    name: CI Gate
    uses: ./.github/workflows/ci.yml

  # ── Build fresh cc2 + all artifacts ──
  build:
    name: Build Release
    needs: [ci]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify version consistency
        run: |
          FILE_VERSION=$(cat VERSION | tr -d '[:space:]')
          TAG_VERSION="${GITHUB_REF_NAME}"
          if [ "$FILE_VERSION" != "$TAG_VERSION" ]; then
            echo "ERROR: VERSION ($FILE_VERSION) != tag ($TAG_VERSION)"
            exit 1
          fi
          echo "Version verified: $TAG_VERSION"

      - name: Install qemu-user
        run: sudo apt-get update && sudo apt-get install -y qemu-user-static

      - name: Bootstrap fresh toolchain
        run: |
          sh bootstrap/bootstrap.sh
          # Build cc2 from committed cc2 (bridge compile)
          chmod +x build/cc2
          # Rebuild cc2 from source to verify reproducibility
          cat src/compiler.cyr | ./build/cc2 > /tmp/cc2_release
          chmod +x /tmp/cc2_release
          cat src/compiler.cyr | /tmp/cc2_release > /tmp/cc2_verify
          cmp /tmp/cc2_release /tmp/cc2_verify
          echo "PASS: release cc2 self-hosts"
          cp /tmp/cc2_release build/cc2

      - name: Build all tools
        run: |
          cat src/compiler_aarch64.cyr | ./build/cc2 > ./build/cc2_aarch64 && chmod +x ./build/cc2_aarch64
          cat programs/cyrfmt.cyr | ./build/cc2 > ./build/cyrfmt && chmod +x ./build/cyrfmt
          cat programs/cyrlint.cyr | ./build/cc2 > ./build/cyrlint && chmod +x ./build/cyrlint
          cat programs/cyrdoc.cyr | ./build/cc2 > ./build/cyrdoc && chmod +x ./build/cyrdoc
          cat programs/cyrc.cyr | ./build/cc2 > ./build/cyrc && chmod +x ./build/cyrc
          cat programs/ark.cyr | ./build/cc2 > ./build/ark && chmod +x ./build/ark

      - name: Package artifacts
        run: |
          VER="${GITHUB_REF_NAME}"
          STAGE="cyrius-${VER}-x86_64-linux"
          mkdir -p "$STAGE/bin" "$STAGE/lib"

          # Binaries
          for bin in cc2 cc2_aarch64 cyrfmt cyrlint cyrdoc cyrc ark; do
            if [ -x "build/$bin" ]; then cp "build/$bin" "$STAGE/bin/"; fi
          done
          cp bootstrap/asm "$STAGE/bin/"
          cp scripts/cyrb "$STAGE/bin/"
          cp scripts/cyrb-init.sh "$STAGE/bin/"
          chmod +x "$STAGE/bin/cyrb" "$STAGE/bin/cyrb-init.sh"

          # Standard library
          cp -r lib/* "$STAGE/lib/"

          # Metadata
          cp VERSION "$STAGE/"
          cp LICENSE "$STAGE/"
          cp scripts/install.sh "$STAGE/"

          # Create tarball
          tar czf "${STAGE}.tar.gz" "$STAGE"
          sha256sum "${STAGE}.tar.gz" > "${STAGE}.tar.gz.sha256"

          # Also keep standalone installer for curl-pipe
          mkdir -p dist
          mv "${STAGE}.tar.gz" dist/
          mv "${STAGE}.tar.gz.sha256" dist/
          cp scripts/install.sh dist/

      - uses: actions/upload-artifact@v4
        with:
          name: cyrius-${{ github.ref_name }}
          path: dist/

  # ── Create GitHub Release ──
  release:
    name: Create GitHub Release
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: cyrius-${{ github.ref_name }}
          path: dist/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: "Cyrius ${{ github.ref_name }}"
          generate_release_notes: true
          prerelease: ${{ startsWith(github.ref_name, '0.') }}
          files: dist/*
