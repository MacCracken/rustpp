name: Release

on:
  push:
    tags: ['*']

permissions:
  contents: write

jobs:
  # ── CI Gate (must pass before release) ──
  ci:
    name: CI Gate
    uses: ./.github/workflows/ci.yml

  # ── Build x86_64 ──
  build-x86:
    name: Build x86_64
    needs: [ci]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify version consistency
        run: |
          FILE_VERSION=$(cat VERSION | tr -d '[:space:]')
          TAG_VERSION="${GITHUB_REF_NAME}"
          if [ "$FILE_VERSION" != "$TAG_VERSION" ]; then
            echo "ERROR: VERSION ($FILE_VERSION) != tag ($TAG_VERSION)"
            exit 1
          fi
          echo "Version verified: $TAG_VERSION"

      - name: Bootstrap fresh toolchain
        run: |
          sh bootstrap/bootstrap.sh
          chmod +x build/cc2
          cat src/main.cyr | ./build/cc2 > /tmp/cc2_release
          chmod +x /tmp/cc2_release
          cat src/main.cyr | /tmp/cc2_release > /tmp/cc2_verify
          cmp /tmp/cc2_release /tmp/cc2_verify
          echo "PASS: cc2 self-hosts (x86_64)"
          cp /tmp/cc2_release build/cc2

      - name: Build tools
        run: |
          for tool in cyrfmt cyrlint cyrdoc cyrc ark; do
            cat programs/${tool}.cyr | ./build/cc2 > ./build/${tool} && chmod +x ./build/${tool}
          done
          # cyrb is the shell script (not compiled binary) — has -D, deps, pulsar
          cp scripts/cyrb ./build/cyrb && chmod +x ./build/cyrb
          # Cross-compile aarch64 compiler for inclusion in x86_64 tarball
          cat src/main_aarch64.cyr | ./build/cc2 > ./build/cc2_aarch64 && chmod +x ./build/cc2_aarch64

      - name: Verify x86_64 binary
        run: |
          file build/cc2 | grep -q "ELF 64-bit.*x86-64" || { echo "ERROR: cc2 not x86_64"; file build/cc2; exit 1; }
          echo "PASS: cc2 is x86_64 ELF"

      - name: Package x86_64 tarball
        run: |
          VER="${GITHUB_REF_NAME}"
          STAGE="cyrius-${VER}-x86_64-linux"
          mkdir -p "$STAGE/bin" "$STAGE/lib"

          for bin in cc2 cyrb cyrfmt cyrlint cyrdoc cyrc ark; do
            [ -f "build/$bin" ] && cp "build/$bin" "$STAGE/bin/"
          done
          # Include cross-compiler separately (not in bin/ — it's a dev tool)
          [ -f "build/cc2_aarch64" ] && cp "build/cc2_aarch64" "$STAGE/"
          cp bootstrap/asm "$STAGE/bin/"
          for script in scripts/cyrb-*.sh; do
            [ -f "$script" ] && cp "$script" "$STAGE/bin/"
          done
          cp scripts/ci.sh "$STAGE/bin/" 2>/dev/null || true
          chmod +x "$STAGE/bin"/*

          cp -r lib/* "$STAGE/lib/"
          cp VERSION LICENSE "$STAGE/"
          cp scripts/install.sh "$STAGE/"

          tar czf "${STAGE}.tar.gz" "$STAGE"
          sha256sum "${STAGE}.tar.gz" > "${STAGE}.tar.gz.sha256"

          mkdir -p dist
          mv "${STAGE}.tar.gz" "${STAGE}.tar.gz.sha256" dist/

      - uses: actions/upload-artifact@v4
        with:
          name: release-x86_64
          path: dist/

  # ── Build aarch64 ──
  build-aarch64:
    name: Build aarch64
    needs: [ci]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install qemu-user
        run: sudo apt-get update && sudo apt-get install -y qemu-user-static

      - name: Build native aarch64 compiler
        run: |
          chmod +x build/cc2
          # Step 1: x86 cc2 → cross-compiler (x86 binary that emits aarch64)
          cat src/main_aarch64.cyr | ./build/cc2 > /tmp/cc2_cross && chmod +x /tmp/cc2_cross
          # Step 2: cross-compiler → native aarch64 binary
          cat src/main_aarch64.cyr | /tmp/cc2_cross > ./build/cc2_aarch64 && chmod +x ./build/cc2_aarch64
          echo "cc2_aarch64: $(wc -c < ./build/cc2_aarch64) bytes"
          # Verify architecture
          file ./build/cc2_aarch64 | grep -q "ARM aarch64" || { echo "ERROR: not aarch64"; file ./build/cc2_aarch64; exit 1; }
          # Smoke test under qemu
          echo "var x = 42;" | timeout 30 qemu-aarch64-static ./build/cc2_aarch64 > /tmp/a64_test && chmod +x /tmp/a64_test
          result=$(timeout 5 qemu-aarch64-static /tmp/a64_test; echo $?)
          test "$result" = "42" && echo "PASS: native aarch64 compiler works"

      - name: Package aarch64 tarball
        run: |
          VER="${GITHUB_REF_NAME}"
          STAGE="cyrius-${VER}-aarch64-linux"
          mkdir -p "$STAGE/bin" "$STAGE/lib"

          cp build/cc2_aarch64 "$STAGE/bin/cc2"
          cp scripts/cyrb "$STAGE/bin/"
          cp scripts/cyrb-init.sh "$STAGE/bin/"
          chmod +x "$STAGE/bin"/*

          cp -r lib/* "$STAGE/lib/"
          cp VERSION LICENSE "$STAGE/"
          cp scripts/install.sh "$STAGE/"

          tar czf "${STAGE}.tar.gz" "$STAGE"
          sha256sum "${STAGE}.tar.gz" > "${STAGE}.tar.gz.sha256"

          mkdir -p dist
          mv "${STAGE}.tar.gz" "${STAGE}.tar.gz.sha256" dist/

      - uses: actions/upload-artifact@v4
        with:
          name: release-aarch64
          path: dist/

  # ── Create GitHub Release ──
  release:
    name: Create GitHub Release
    needs: [build-x86, build-aarch64]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: release-x86_64
          path: dist/

      - uses: actions/download-artifact@v4
        with:
          name: release-aarch64
          path: dist/

      - name: Add standalone installer
        run: cp scripts/install.sh dist/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: "Cyrius ${{ github.ref_name }}"
          generate_release_notes: true
          prerelease: ${{ startsWith(github.ref_name, '0.') }}
          files: dist/*
