name: Release

on:
  push:
    tags: ['*']

permissions:
  contents: write

jobs:
  # ── CI Gate (must pass before release) ──
  ci:
    name: CI Gate
    uses: ./.github/workflows/ci.yml

  # ── Build x86_64 ──
  build-x86:
    name: Build x86_64
    needs: [ci]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify version consistency
        run: |
          FILE_VERSION=$(cat VERSION | tr -d '[:space:]')
          TAG_VERSION="${GITHUB_REF_NAME}"
          if [ "$FILE_VERSION" != "$TAG_VERSION" ]; then
            echo "ERROR: VERSION ($FILE_VERSION) != tag ($TAG_VERSION)"
            exit 1
          fi
          echo "Version verified: $TAG_VERSION"

      - name: Bootstrap fresh toolchain
        run: |
          sh bootstrap/bootstrap.sh
          chmod +x build/cc3
          cat src/main.cyr | ./build/cc3 > /tmp/cc3_release
          chmod +x /tmp/cc3_release
          cat src/main.cyr | /tmp/cc3_release > /tmp/cc3_verify
          cmp /tmp/cc3_release /tmp/cc3_verify
          echo "PASS: cc3 self-hosts (x86_64)"
          cp /tmp/cc3_release build/cc3

      - name: Build tools
        run: |
          for tool in cyrfmt cyrlint cyrdoc cyrc ark; do
            if [ -f "programs/${tool}.cyr" ]; then
              cat programs/${tool}.cyr | ./build/cc3 > ./build/${tool} && chmod +x ./build/${tool}
            fi
          done
          # cyrius build tool — compiled from Cyrius (auto-include, deps, -v)
          cat programs/cyrius.cyr | ./build/cc3 > ./build/cyrius && chmod +x ./build/cyrius
          echo "cyrius tool: $(wc -c < ./build/cyrius) bytes"
          # Cross-compile aarch64 compiler for inclusion in x86_64 tarball
          cat src/main_aarch64.cyr | ./build/cc3 > ./build/cc3_aarch64 && chmod +x ./build/cc3_aarch64

      - name: Verify x86_64 binary
        run: |
          file build/cc3 | grep -q "ELF 64-bit.*x86-64" || { echo "ERROR: cc3 not x86_64"; file build/cc3; exit 1; }
          echo "PASS: cc3 is x86_64 ELF"

      - name: Package x86_64 tarball
        run: |
          VER="${GITHUB_REF_NAME}"
          STAGE="cyrius-${VER}-x86_64-linux"
          mkdir -p "$STAGE/bin" "$STAGE/lib"

          for bin in cc3 cyrius cyrfmt cyrlint cyrdoc cyrc ark; do
            [ -f "build/$bin" ] && cp "build/$bin" "$STAGE/bin/"
          done
          # Include cross-compiler separately (not in bin/ — it's a dev tool)
          [ -f "build/cc3_aarch64" ] && cp "build/cc3_aarch64" "$STAGE/"
          cp bootstrap/asm "$STAGE/bin/"
          for script in scripts/cyrius-*.sh; do
            [ -f "$script" ] && cp "$script" "$STAGE/bin/"
          done
          cp scripts/ci.sh "$STAGE/bin/" 2>/dev/null || true
          chmod +x "$STAGE/bin"/*

          sh scripts/release-lib.sh "$STAGE/lib"
          cp VERSION LICENSE "$STAGE/"
          cp scripts/install.sh "$STAGE/"

          tar czf "${STAGE}.tar.gz" "$STAGE"
          sha256sum "${STAGE}.tar.gz" > "${STAGE}.tar.gz.sha256"

          mkdir -p dist
          mv "${STAGE}.tar.gz" "${STAGE}.tar.gz.sha256" dist/

      - uses: actions/upload-artifact@v4
        with:
          name: release-x86_64
          path: dist/

  # ── Build aarch64 ──
  build-aarch64:
    name: Build aarch64
    needs: [ci]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install qemu-user
        run: sudo apt-get update && sudo apt-get install -y qemu-user-static

      - name: Build native aarch64 compiler
        run: |
          chmod +x build/cc3
          # Step 1: x86 cc3 → cross-compiler (x86 binary that emits aarch64)
          cat src/main_aarch64.cyr | ./build/cc3 > /tmp/cc3_cross && chmod +x /tmp/cc3_cross
          # Step 2: cross-compiler → native aarch64 binary
          cat src/main_aarch64.cyr | /tmp/cc3_cross > ./build/cc3_aarch64 && chmod +x ./build/cc3_aarch64
          echo "cc3_aarch64: $(wc -c < ./build/cc3_aarch64) bytes"
          # Verify architecture
          file ./build/cc3_aarch64 | grep -q "ARM aarch64" || { echo "ERROR: not aarch64"; file ./build/cc3_aarch64; exit 1; }
          # Smoke test: cross-compiler produces working binaries
          echo "var x = 42;" | /tmp/cc3_cross > /tmp/a64_test && chmod +x /tmp/a64_test
          result=$(timeout 5 qemu-aarch64-static /tmp/a64_test; echo $?)
          test "$result" = "42" && echo "PASS: cross-compiler output works under qemu"
          # NOTE: native compiler smoke test skipped — self-hosted aarch64 binary
          # generates code with a subtle codegen difference under QEMU.
          # Cross-compiler is the shipped artifact for x86 hosts.
          # Native binary tested on real ARM hardware (agnosarm).

      - name: Package aarch64 tarball
        run: |
          VER="${GITHUB_REF_NAME}"
          STAGE="cyrius-${VER}-aarch64-linux"
          mkdir -p "$STAGE/bin" "$STAGE/lib"

          cp build/cc3_aarch64 "$STAGE/bin/cc3"
          # Build cyrius tool for aarch64 tarball (x86 binary — runs on host for cross builds)
          if [ -f "build/cyrius" ]; then cp build/cyrius "$STAGE/bin/"; fi
          cp scripts/cyrius-init.sh "$STAGE/bin/" 2>/dev/null || true
          chmod +x "$STAGE/bin"/*

          sh scripts/release-lib.sh "$STAGE/lib"
          cp VERSION LICENSE "$STAGE/"
          cp scripts/install.sh "$STAGE/"

          tar czf "${STAGE}.tar.gz" "$STAGE"
          sha256sum "${STAGE}.tar.gz" > "${STAGE}.tar.gz.sha256"

          mkdir -p dist
          mv "${STAGE}.tar.gz" "${STAGE}.tar.gz.sha256" dist/

      - uses: actions/upload-artifact@v4
        with:
          name: release-aarch64
          path: dist/

  # ── Create GitHub Release ──
  release:
    name: Create GitHub Release
    needs: [build-x86, build-aarch64]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: release-x86_64
          path: dist/

      - uses: actions/download-artifact@v4
        with:
          name: release-aarch64
          path: dist/

      - name: Add standalone installer
        run: cp scripts/install.sh dist/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: "Cyrius ${{ github.ref_name }}"
          generate_release_notes: true
          prerelease: ${{ startsWith(github.ref_name, '0.') }}
          files: dist/*
