name: Release

on:
  push:
    tags: ['*']

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  release:
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Verify VERSION matches tag
        run: |
          VERSION=$(cat VERSION | tr -d '[:space:]')
          TAG="${GITHUB_REF#refs/tags/}"
          if [ "$VERSION" != "$TAG" ]; then
            echo "ERROR: VERSION ($VERSION) does not match tag ($TAG)"
            exit 1
          fi

      - name: Bootstrap + build
        run: |
          sh bootstrap/bootstrap.sh
          cat stage1/cc2.cyr | ./build/stage1f > ./build/cc2 && chmod +x ./build/cc2
          cat stage1/cc2_aarch64.cyr | ./build/cc2 > ./build/cc2_aarch64 && chmod +x ./build/cc2_aarch64
          cat stage1/programs/cyrb.cyr | ./build/cc2 > ./build/cyrb && chmod +x ./build/cyrb
          cat stage1/programs/ark.cyr | ./build/cc2 > ./build/ark && chmod +x ./build/ark

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            build/cc2
            build/cc2_aarch64
            build/cyrb
            build/ark
            bootstrap/asm
